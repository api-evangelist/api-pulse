naftiko: 1.0.0-alpha2
info:
  label: API Pulse Publishing
  description: This is the API for publishing to the API pulse.
  tags:
  - Api
  - Pulse
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: api-pulse
    baseUri: http://api.theapipulse.com
    description: API Pulse Publishing HTTP API.
    resources:
    - name: signals
      path: /signals
      operations:
      - name: submitsignal
        method: POST
        description: API Pulse Submit Signal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: api-pulse-rest
    description: REST adapter for API Pulse Publishing.
    resources:
    - path: /signals
      name: submitsignal
      operations:
      - method: POST
        name: submitsignal
        description: API Pulse Submit Signal
        call: api-pulse.submitsignal
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: api-pulse-mcp
    transport: http
    description: MCP adapter for API Pulse Publishing for AI agent use.
    tools:
    - name: submitsignal
      description: API Pulse Submit Signal
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: api-pulse.submitsignal
      outputParameters:
      - type: object
        mapping: $.
